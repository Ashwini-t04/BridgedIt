<!DOCTYPE html>
<html>
<head>
    <title>Signup - BridgedIt</title>
    <style>
        body {
            font-family: Arial;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #059669;
        }

        a {
            display: block;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Signup</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="email" placeholder="Email" required>
        <input name="password" type="password" placeholder="Password" required>

        <select name="role">
            <option value="candidate">Candidate</option>
            <option value="recruiter">Recruiter</option>
        </select>

        <button type="submit">Create Account</button>
    </form>

    <a href="/login">Already have an account?</a>
</div>

</body>
</html>
